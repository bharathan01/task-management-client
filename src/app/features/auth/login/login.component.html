<div class="login-container">
  <div class="brand-section">
    <h1>Task Board</h1>
    <p>Project Management System</p>
  </div>

  <mat-card class="login-card">
    <h2>Welcome Back</h2>

    <p class="subtitle">Sign in to continue managing your tasks.</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="Enter your email" />
        <mat-icon matPrefix>mail</mat-icon>
        <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Enter a valid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter your password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Minimum 3 characters</mat-error>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        class="login-btn"
        type="submit"
        [disabled]="isLoading"
      >
        <mat-spinner *ngIf="isLoading" diameter="20" class="spinner"></mat-spinner>
        <span *ngIf="!isLoading">Login</span>
      </button>
    </form>
  </mat-card>
</div>
