<div class="settings-container">
  <h1 class="page-title">Settings</h1>

  <mat-card class="settings-card">
    <mat-card-header>
      <mat-card-title>Capacity Planning Limits</mat-card-title>
      <mat-card-subtitle>Configure limits for daily and weekly story points.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()" class="settings-form">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Daily Story Point Limit</mat-label>
          <input matInput type="number" formControlName="dailySpLimit" placeholder="e.g. 8">
          <mat-error *ngIf="settingsForm.get('dailySpLimit')?.hasError('required')">
            Daily limit is required.
          </mat-error>
          <mat-error *ngIf="settingsForm.get('dailySpLimit')?.hasError('min')">
            Limit must be greater than zero.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Weekly Story Point Limit</mat-label>
          <input matInput type="number" formControlName="weeklySpLimit" placeholder="e.g. 40">
          <mat-error *ngIf="settingsForm.get('weeklySpLimit')?.hasError('required')">
            Weekly limit is required.
          </mat-error>
          <mat-error *ngIf="settingsForm.get('weeklySpLimit')?.hasError('min')">
            Limit must be greater than zero.
          </mat-error>
        </mat-form-field>

        <div class="actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="settingsForm.invalid || isSaving">
            <mat-spinner *ngIf="isSaving" diameter="20" style="display: inline-block; margin-right: 8px;"></mat-spinner>
            <span>Save Changes</span>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
